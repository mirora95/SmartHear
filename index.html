<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartHear</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: #f4f8fb;
        color: #17324d;
      }

      main {
        max-width: 32rem;
        padding: 2rem;
        text-align: center;
      }

      a {
        color: #0b6bcb;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Opening SmartHear...</h1>
      <p id="ready-message" class="hidden">If the app does not open automatically, use <a href="./dist/app.html">this link</a>.</p>
      <p id="missing-message" class="hidden">The built app was not found. Run <code>npm.cmd run build</code>, then refresh this page.</p>
    </main>
    <script>
      const readyMessage = document.getElementById('ready-message');
      const missingMessage = document.getElementById('missing-message');

      fetch('./dist/app.html', { method: 'HEAD' })
        .then((response) => {
          if (response.ok) {
            readyMessage.classList.remove('hidden');
            window.location.replace('./dist/app.html');
            return;
          }

          missingMessage.classList.remove('hidden');
        })
        .catch(() => {
          missingMessage.classList.remove('hidden');
        });
    </script>
  </body>
</html>
